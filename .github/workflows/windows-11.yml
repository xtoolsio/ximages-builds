# Build + publish the Windows Server 2025 (Evaluation) image (Track A3).
#
# Unlike the Linux passthroughs, this BUILDS the image: Microsoft
# evaluation ISO → unattended install under QEMU/KVM on the runner →
# virtio drivers + QEMU guest agent + Cloudbase-Init → sysprep
# /generalize → compressed qcow2 → cosign sign → publish in the same
# 5-file layout as every other official image. Sources: windows/win11/.
#
# Licensing: 180-day evaluation media, clearly labeled — production
# use requires the customer's own licensing (BYOL/SPLA).

name: windows-11

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version (YYYYMMDD); defaults to today"
        required: false
        default: ""

permissions:
  id-token: write   # cosign keyless signing via GitHub OIDC
  contents: read

env:
  SPACES_HOST: sfo3.digitaloceanspaces.com
  BUCKET: xtools-data
  SLUG: windows-11

jobs:
  build:
    runs-on: [self-hosted, linux, x64, kvm]
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h / /mnt

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install QEMU + Packer
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf xorriso swtpm swtpm-tools gvncviewer
          echo "== OVMF secure-boot firmware =="; ls -l /usr/share/OVMF/OVMF_CODE_4M.secboot.fd /usr/share/OVMF/OVMF_VARS_4M.ms.fd
          command -v swtpm >/dev/null || { echo "swtpm missing"; exit 1; }
          # --batch --yes: overwrite the keyring non-interactively (on a
          # persistent self-hosted runner the file survives between runs and
          # plain --dearmor would try to prompt via /dev/tty and fail).
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -q && sudo apt-get install -y packer
          packer version

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION="$(date -u +%Y%m%d)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Packer build (unattended install + provision + sysprep)
        working-directory: windows/win11
        env:
          PACKER_LOG: "1"
          PACKER_LOG_PATH: packer.log
        run: |
          # Cache big downloads OUTSIDE the repo checkout — actions/checkout
          # cleans untracked files in the work dir on every run, so an ISO
          # cached inside windows/win11 would be re-downloaded every time.
          CACHE="$HOME/win11build"; mkdir -p "$CACHE"

          # Windows 11 Enterprise install ISO (~5GB).
          [ -s "$CACHE/win11.iso" ] || curl -fsSL -o "$CACHE/win11.iso" "https://go.microsoft.com/fwlink/?linkid=2289031"
          sz=$(stat -c%s "$CACHE/win11.iso"); [ "$sz" -gt 4000000000 ] || { echo "win11.iso too small ($sz bytes)"; rm -f "$CACHE/win11.iso"; exit 1; }

          # Inject autounattend.xml into the install-media ROOT. Windows 11
          # 24H2's redesigned Setup (SetupPrep.exe) no longer reads the answer
          # file from a *separate* CD — it must be on the install media itself.
          #
          # Windows media stores its real payload in a UDF filesystem; xorriso
          # can only read the tiny ISO9660 stub (README.TXT), so extract-and-
          # rebuild via xorriso silently loses everything. Mount the UDF with
          # the kernel driver, copy the full tree, add the answer file, then
          # rebuild a BIOS+UEFI El Torito ISO. -iso-level 3 gives multi-extent
          # support for the 4.3GB install.wim (>4GiB); do NOT use
          # -allow-limited-size — that TRUNCATES large files.
          UA="$PWD/autounattend.xml"; [ -s "$UA" ] || { echo "autounattend.xml missing"; exit 1; }
          ISOROOT="$CACHE/isoroot"; OUT="$CACHE/win11-ua.iso"
          sudo umount /mnt/w11 2>/dev/null || true
          sudo rm -rf "$ISOROOT" "$OUT"; mkdir -p "$ISOROOT" /mnt/w11
          sudo mount -o loop,ro "$CACHE/win11.iso" /mnt/w11
          sudo cp -a /mnt/w11/. "$ISOROOT"/
          sudo umount /mnt/w11
          sudo cp "$UA" "$ISOROOT/autounattend.xml"
          echo "== install.wim / boot images in rebuilt tree =="
          ls -l "$ISOROOT/sources/install.wim" "$ISOROOT/boot/etfsboot.com" "$ISOROOT/efi/microsoft/boot/efisys_noprompt.bin"
          xorriso -as mkisofs -o "$OUT" -iso-level 3 -r -J -joliet-long -V "WIN11UA" \
            -b boot/etfsboot.com -no-emul-boot -boot-load-size 8 -boot-info-table \
            -eltorito-alt-boot -e efi/microsoft/boot/efisys_noprompt.bin -no-emul-boot \
            "$ISOROOT"
          sudo rm -rf "$ISOROOT"
          [ -s "$OUT" ] || { echo "ISO repack failed"; exit 1; }
          echo "repacked ISO: $(du -h "$OUT" | cut -f1)"
          export PKR_VAR_iso_url="file://$OUT"
          export PKR_VAR_boot_iso="$OUT"

          # virtio-win ISO for the viostor boot-driver injection (q35 has
          # no inbox disk bus). Cached outside the checkout too.
          [ -s "$CACHE/virtio-win.iso" ] || curl -fsSL -o "$CACHE/virtio-win.iso" https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso
          file "$CACHE/virtio-win.iso" | grep -qi 'ISO 9660' || { echo "virtio-win.iso is not an ISO"; rm -f "$CACHE/virtio-win.iso"; exit 1; }
          export PKR_VAR_virtio_iso="$CACHE/virtio-win.iso"

          # Fresh WRITABLE copy of the OVMF Secure Boot variable store for
          # this build (the distro file is read-only; Secure Boot state is
          # written into it at boot). Passed to QEMU pflash unit 1.
          cp -f /usr/share/OVMF/OVMF_VARS_4M.ms.fd "$CACHE/OVMF_VARS.fd"
          chmod u+w "$CACHE/OVMF_VARS.fd"
          export PKR_VAR_ovmf_vars="$CACHE/OVMF_VARS.fd"

          # Absolute path to the install disk Packer creates under this
          # working dir (output/<vm_name>); passed to the hand-rolled
          # virtio-blk device in qemuargs. Absolute so it resolves no matter
          # what cwd Packer launches QEMU from.
          export PKR_VAR_output_disk="$PWD/output/win11.qcow2"
          packer init .
          # Screenshot the guest console (VNC :99) every 30s so we can SEE
          # what a hang is stuck on instead of flying blind. Shots upload
          # as an artifact even on failure.
          mkdir -p "$GITHUB_WORKSPACE/win11-shots"
          ( n=0; while true; do n=$((n+1));
              gvnccapture 127.0.0.1:99 "$GITHUB_WORKSPACE/win11-shots/$(printf '%04d' $n)-$(date -u +%H%M%S).png" >/dev/null 2>&1 || true;
              sleep 30; done ) &
          SHOT_PID=$!
          set +e
          packer build -timestamp-ui .
          RC=$?
          kill $SHOT_PID 2>/dev/null || true
          if [ $RC -ne 0 ]; then echo "== last 200 packer log lines =="; tail -200 packer.log; fi
          exit $RC

      - name: Upload guest screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win11-console-screenshots
          path: win11-shots/
          if-no-files-found: warn

      - name: Compress qcow2
        run: |
          mkdir -p out
          qemu-img convert -O qcow2 -c windows/win11/output/win11.qcow2 out/image.qcow2
          rm -rf windows/win11/output
          qemu-img info out/image.qcow2
          df -h /

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign (cosign keyless + Rekor offline bundle)
        run: |
          cosign sign-blob --yes \
            --output-signature out/signature.sig \
            --bundle out/rekor-bundle.json \
            out/image.qcow2

      - name: Write manifest.json + provenance.json + latest.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHA256="$(sha256sum out/image.qcow2 | cut -d' ' -f1)"
          SIZE="$(stat -c%s out/image.qcow2)"
          IDENTITY="https://github.com/${{ github.repository }}/.github/workflows/windows-11.yml@${{ github.ref }}"
          FAM=$(jq -c --arg s "$SLUG" '.[] | select(.slug == $s)' families.json)
          [ -n "$FAM" ] || { echo "family $SLUG missing from families.json"; exit 1; }

          jq -n \
            --argjson fam "$FAM" \
            --arg version "$VERSION" \
            --arg published_at "$NOW" \
            --arg sha256 "$SHA256" \
            --argjson size "$SIZE" \
            --arg identity "$IDENTITY" \
            '{schema_version: 1, family_id: $fam.family_id, os: $fam.os,
              os_version: $fam.os_version, arch: $fam.arch, hypervisor: $fam.hypervisor,
              name: $fam.name, description: $fam.description,
              version: $version, published_at: $published_at,
              qcow2: {file: "image.qcow2", sha256: $sha256, size_bytes: $size},
              signing_identity: $identity}' > out/manifest.json

          jq -n \
            --arg sha256 "$SHA256" \
            --arg repo_uri "git+https://github.com/${{ github.repository }}@${{ github.ref }}" \
            --arg commit "${{ github.sha }}" \
            --arg identity "$IDENTITY" \
            --arg run "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg started "$NOW" \
            '{"_type": "https://in-toto.io/Statement/v1",
              subject: [{name: "image.qcow2", digest: {sha256: $sha256}}],
              predicateType: "https://slsa.dev/provenance/v1",
              predicate: {
                buildDefinition: {
                  buildType: "https://github.com/xtoolsio/ximages-builds/packer-windows/v1",
                  externalParameters: {
                    iso: "Microsoft Windows 11 Enterprise Evaluation 24H2 (go.microsoft.com fwlink 2289031)",
                    packerTemplate: "windows/win11/win11.pkr.hcl"},
                  resolvedDependencies: [{uri: $repo_uri, digest: {gitCommit: $commit}}]},
                runDetails: {builder: {id: $identity},
                  metadata: {invocationId: $run, startedOn: $started}}}}' > out/provenance.json

          jq -n --arg version "$VERSION" --arg published_at "$NOW" \
            '{version: $version, published_at: $published_at}' > out/latest.json

          cat out/manifest.json

      - name: Sign the manifest (what ximagesd verifies)
        run: |
          cosign sign-blob --yes \
            --output-signature out/manifest.sig \
            --bundle out/manifest-bundle.json \
            out/manifest.json

      - name: Verify locally what ximagesd will verify
        run: |
          cosign verify-blob \
            --bundle out/manifest-bundle.json \
            --certificate-identity-regexp '^https://github\.com/xtoolsio/ximages-builds/\.github/workflows/.+@refs/(heads/main|tags/.+)$' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            out/manifest.json

      - name: Install s3cmd
        run: sudo apt-get install -y s3cmd

      - name: Upload to download.xtools.com (DO Spaces)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          FAM=$(jq -c --arg s "$SLUG" '.[] | select(.slug == $s)' families.json)
          FAMILY_PATH="ximages/official/$SLUG/$(jq -r .arch <<<"$FAM")/$(jq -r .hypervisor <<<"$FAM")"
          put() { s3cmd put --acl-public "$@" \
            --host="$SPACES_HOST" \
            --host-bucket="%(bucket)s.$SPACES_HOST" \
            --access_key=${{ secrets.SPACES_ACCESS_KEY }} \
            --secret_key=${{ secrets.SPACES_SECRET_KEY }}; }
          for f in manifest.json manifest.sig manifest-bundle.json image.qcow2 signature.sig provenance.json rekor-bundle.json; do
            put "out/$f" "s3://$BUCKET/$FAMILY_PATH/$VERSION/$f"
          done
          put --add-header="Cache-Control: max-age=60" out/latest.json "s3://$BUCKET/$FAMILY_PATH/latest.json"

  index:
    needs: build
    uses: ./.github/workflows/index.yml
    secrets: inherit
