# Publish the xTools-official Ubuntu Server 24.04 image for Proxmox.
#
# Track A of the xImages M3.0 plan (xTools monorepo:
# xImages/STATUS.md). This is the minimal A4 publish pipeline: it takes
# the upstream Ubuntu 24.04 cloud image (checksum-verified against
# Canonical's SHA256SUMS), signs it cosign-keyless with this workflow's
# GitHub OIDC identity, and publishes the 5-file artifact layout that
# ximagesd's pull engine consumes:
#
#   ximages/official/ubuntu-server-24.04/amd64/proxmox/latest.json
#   ximages/official/ubuntu-server-24.04/amd64/proxmox/<version>/
#     manifest.json  image.qcow2  signature.sig  provenance.json  rekor-bundle.json
#
# The consumer-side contract (manifest schema v1 + URL layout) is
# defined in the xTools monorepo at xImages/server/internal/pull/official.go.
# ximagesd's baked trust bundle allowlists this workflow's identity:
#   ^https://github\.com/xtoolsio/ximages-builds/\.github/workflows/.+@refs/(heads/main|tags/.+)$
#
# Later Track A stages replace the upstream-image passthrough with real
# Packer builds (migrated from the monorepo PoC sources) and add SLSA
# provenance generation + Windows Server 2025.

name: publish-ubuntu-server-2404

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version (YYYYMMDD); defaults to today"
        required: false
        default: ""

permissions:
  id-token: write   # cosign keyless signing via GitHub OIDC
  contents: read

env:
  FAMILY_ID: xtools/ubuntu-server-24.04/amd64/proxmox
  FAMILY_PATH: ximages/official/ubuntu-server-24.04/amd64/proxmox
  UPSTREAM_BASE: https://cloud-images.ubuntu.com/noble/current

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION="$(date -u +%Y%m%d)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Download upstream Ubuntu 24.04 cloud image
        run: |
          curl -fsSLO "$UPSTREAM_BASE/noble-server-cloudimg-amd64.img"
          curl -fsSLO "$UPSTREAM_BASE/SHA256SUMS"
          grep "noble-server-cloudimg-amd64.img$" SHA256SUMS | sha256sum -c -
          mkdir -p out
          mv noble-server-cloudimg-amd64.img out/image.qcow2
          # Confirm it really is qcow2 before we publish it as one.
          file out/image.qcow2 | grep -qi qcow || { echo "not a qcow2 image"; exit 1; }

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign (cosign keyless + Rekor offline bundle)
        run: |
          cosign sign-blob --yes \
            --output-signature out/signature.sig \
            --bundle out/rekor-bundle.json \
            out/image.qcow2

      - name: Write manifest.json + provenance.json + latest.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHA256="$(sha256sum out/image.qcow2 | cut -d' ' -f1)"
          SIZE="$(stat -c%s out/image.qcow2)"
          IDENTITY="https://github.com/${{ github.repository }}/.github/workflows/publish-ubuntu-server-2404.yml@${{ github.ref }}"

          # manifest.json — schema v1 per xImages/server/internal/pull/official.go
          cat > out/manifest.json <<EOF
          {
            "schema_version": 1,
            "family_id": "$FAMILY_ID",
            "os": "ubuntu-server",
            "os_version": "24.04",
            "arch": "amd64",
            "hypervisor": "proxmox",
            "name": "Ubuntu Server 24.04 LTS",
            "description": "Ubuntu Server 24.04 LTS (Noble Numbat) cloud image for xCompute, published and signed by xTools.",
            "version": "$VERSION",
            "published_at": "$NOW",
            "qcow2": { "file": "image.qcow2", "sha256": "$SHA256", "size_bytes": $SIZE },
            "signing_identity": "$IDENTITY"
          }
          EOF

          # provenance.json — in-toto statement recording where these
          # bytes came from and which workflow run published them.
          # (Full SLSA L2 attestation via cosign attest-blob is a later
          # Track A stage; this file is stored + surfaced, not yet
          # independently verified by ximagesd.)
          cat > out/provenance.json <<EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "subject": [{ "name": "image.qcow2", "digest": { "sha256": "$SHA256" } }],
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildDefinition": {
                "buildType": "https://github.com/xtoolsio/ximages-builds/upstream-passthrough/v1",
                "externalParameters": {
                  "upstream": "$UPSTREAM_BASE/noble-server-cloudimg-amd64.img",
                  "upstreamChecksumSource": "$UPSTREAM_BASE/SHA256SUMS"
                },
                "resolvedDependencies": [{
                  "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                  "digest": { "gitCommit": "${{ github.sha }}" }
                }]
              },
              "runDetails": {
                "builder": { "id": "$IDENTITY" },
                "metadata": {
                  "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "startedOn": "$NOW"
                }
              }
            }
          }
          EOF

          cat > out/latest.json <<EOF
          { "version": "$VERSION", "published_at": "$NOW" }
          EOF

          cat out/manifest.json

      - name: Verify locally what ximagesd will verify
        run: |
          cosign verify-blob \
            --bundle out/rekor-bundle.json \
            --certificate-identity-regexp '^https://github\.com/xtoolsio/ximages-builds/\.github/workflows/.+@refs/(heads/main|tags/.+)$' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            out/image.qcow2

      - name: Install s3cmd
        run: sudo apt-get update -q && sudo apt-get install -y s3cmd

      - name: Upload to download.xtools.com (DO Spaces)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          for f in manifest.json image.qcow2 signature.sig provenance.json rekor-bundle.json; do
            s3cmd put --acl-public "out/$f" \
              "s3://xtools-data/$FAMILY_PATH/$VERSION/$f" \
              --host=sfo3.digitaloceanspaces.com \
              --host-bucket="%(bucket)s.sfo3.digitaloceanspaces.com" \
              --access_key=${{ secrets.SPACES_ACCESS_KEY }} \
              --secret_key=${{ secrets.SPACES_SECRET_KEY }}
          done
          # latest.json flips last so consumers never see a version
          # whose artifacts aren't fully uploaded yet.
          s3cmd put --acl-public out/latest.json \
            "s3://xtools-data/$FAMILY_PATH/latest.json" \
            --host=sfo3.digitaloceanspaces.com \
            --host-bucket="%(bucket)s.sfo3.digitaloceanspaces.com" \
            --access_key=${{ secrets.SPACES_ACCESS_KEY }} \
            --secret_key=${{ secrets.SPACES_SECRET_KEY }}

      - name: Summary
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          {
            echo "### xImages official publish :package:"
            echo ""
            echo "**Family:** \`$FAMILY_ID\`"
            echo "**Version:** \`$VERSION\`"
            echo "**URL:** https://download.xtools.com/$FAMILY_PATH/$VERSION/"
          } >> "$GITHUB_STEP_SUMMARY"
